<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>eCode Business Card | Basel Shubair</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            background-color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            font-family: 'Poppins', sans-serif;
            padding: 50px;
        }

        /* مقاس البطاقة القياسي للطباعة */
        .card {
            width: 700px;
            height: 400px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            background-color: #1e1e2f;
            color: white;
            display: flex;
        }

        /* --- الواجهة الأمامية --- */
        .card-front {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* التدرج اللوني المأخوذ من الشعار */
            background: linear-gradient(135deg, #a855f7, #3b82f6);
        }

        .logo-front {
            width: 140px;
            margin-bottom: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card-front h1 {
            margin: 0;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .card-front h3 {
            margin: 8px 0 0;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #f1f5f9;
        }

        /* --- الواجهة الخلفية --- */
        .card-back {
            flex-direction: row;
            background-color: #0f172a; 
        }

        .left-col {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right-col {
            width: 40%;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(59, 130, 246, 0.1));
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 1px solid rgba(255,255,255,0.05);
        }

        .qr-code {
            width: 180px;
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 18px;
            font-size: 15px;
            color: #cbd5e1;
            letter-spacing: 0.5px;
        }
        
        .info-item b {
            color: #3b82f6;
            font-size: 18px;
            width: 25px;
        }

        .small-logo {
            width: 100px;
            position: absolute;
            top: 40px;
            left: 50px;
            border-radius: 5px;
        }

        .name-back {
            margin-top: 60px;
            margin-bottom: 35px;
        }

        .name-back h2 {
            margin: 0;
            font-size: 26px;
            color: #fff;
        }
        .name-back p {
            margin: 5px 0 0;
            font-size: 13px;
            color: #6F63FF;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 18px;
            font-size: 14px;
            color: #cbd5e1;
            letter-spacing: 0.5px;
        }

        /* تنسيق الأيقونات الجديد بما يتناسب مع الهوية */
        .info-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(168, 85, 247, 0.15); /* خلفية بنفسجية شفافة */
            color: #6F63FF; /* لون الأيقونة البنفسجي */
            flex-shrink: 0;
        }

        .info-icon svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }
    </style>
</head>
<body>

    <div class="card card-front" style="display: flex;">
        <img src="eCode_logo2.png" alt="eCode Logo" class="logo-front">
        <h1>Electronic Code Co.</h1>
        <h3>Making Impact</h3>
    </div>

    <div class="card card-back" style="display: flex;">
        <div class="left-col">
            <img src="eCode_logo1.png" alt="eCode Logo" class="small-logo">
            <div class="name-back">
                <h2>Basel Shubair</h2>
                <p>PROJECT MANAGER</p>
            </div>
            
            <div class="info-item">
                <div class="info-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
                +966 59 250 5652
            </div>
            
            <div class="info-item">
                <div class="info-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </div>
                Basel@eCode.sa
            </div>
            
            <div class="info-item">
                <div class="info-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                </div>
                www.eCode.sa
            </div>
            
            <div class="info-item">
                <div class="info-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                </div>
                Riyadh, Saudi Arabia
            </div>
        </div>
        <div class="right-col">
            <img src="barcode2.png" alt="QR Code" class="qr-code">
        </div>
    </div>

</body>
</html>
