<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basel Shubair</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-color: #0f172a; /* Fallback dark background */
        }

        /* Animated Background for Glassmorphism contrast */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }

        .shape {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }

        .shape-1 {
            top: -10%;
            left: -10%;
            width: 300px;
            height: 300px;
            background: #3b82f6; /* Blue */
            animation-delay: 0s;
        }

        .shape-2 {
            bottom: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: #8b5cf6; /* Purple */
            animation-delay: -5s;
        }

        .shape-3 {
            top: 40%;
            left: 50%;
            width: 250px;
            height: 250px;
            background: #06b6d4; /* Cyan */
            animation-delay: -2s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Glassmorphism Card Style */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Interactive Elements */
        .social-link {
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1.2rem;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .info-item {
            transition: background 0.3s ease;
        }
        
        .info-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
            filter: brightness(1.1);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <!-- Animated Background -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- vCard Container -->
    <main class="glass-card w-full max-w-sm rounded-3xl p-6 relative overflow-hidden flex flex-col items-center">
        
        <!-- Profile Image -->
        <div class="relative w-32 h-32 mb-4 mt-2">
            <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 animate-pulse blur-md opacity-50"></div>
            <img 
                src="https://ecode.sa/icons/favicon/Basel.png" 
                alt="Basel Shubair" 
                class="relative w-full h-full object-cover rounded-full border-2 border-white/20 shadow-xl"
            >
        </div>

        <!-- Name and Title -->
        <h1 class="text-2xl font-bold text-center tracking-wide">Basel Shubair</h1>
        <p class="text-blue-300 text-sm font-medium mb-6 text-center tracking-widest uppercase">Project Manager</p>

        <!-- Action Button (Add to Contacts) -->
        <button onclick="downloadVCard()" class="btn-primary w-full py-3 rounded-xl font-semibold flex items-center justify-center gap-2 mb-8 shadow-lg">
            <i class="fa-solid fa-user-plus"></i>
            Add to Contacts
        </button>

        <!-- Contact Information -->
        <div class="w-full space-y-3 mb-8">
            <!-- Phone -->
            <a href="tel:0592505652" class="info-item flex items-center gap-4 p-3 rounded-xl border border-white/5 bg-white/5 backdrop-blur-sm cursor-pointer text-gray-200 hover:text-white decoration-transparent">
                <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400">
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-400">Phone</p>
                    <p class="font-medium text-sm">059 250 5652</p>
                </div>
            </a>

            <!-- Email -->
            <a href="mailto:Basel@eCode.sa" class="info-item flex items-center gap-4 p-3 rounded-xl border border-white/5 bg-white/5 backdrop-blur-sm cursor-pointer text-gray-200 hover:text-white decoration-transparent">
                <div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center text-purple-400">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="overflow-hidden">
                    <p class="text-xs text-gray-400">Email</p>
                    <p class="font-medium text-sm truncate">Basel@eCode.sa</p>
                </div>
            </a>

            <!-- Website -->
            <a href="https://ecode.sa/" target="_blank" class="info-item flex items-center gap-4 p-3 rounded-xl border border-white/5 bg-white/5 backdrop-blur-sm cursor-pointer text-gray-200 hover:text-white decoration-transparent">
                <div class="w-10 h-10 rounded-full bg-cyan-500/20 flex items-center justify-center text-cyan-400">
                    <i class="fa-solid fa-globe"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-400">Website</p>
                    <p class="font-medium text-sm">https://ecode.sa/</p>
                </div>
            </a>

            <!-- Location -->
            <div class="info-item flex items-center gap-4 p-3 rounded-xl border border-white/5 bg-white/5 backdrop-blur-sm text-gray-200">
                <div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center text-red-400">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-400">Location</p>
                    <p class="font-medium text-sm">Riyadh — Saudi Arabia</p>
                </div>
            </div>
        </div>

        <!-- Social Media Links -->
        <div class="w-full">
            <h3 class="text-xs text-gray-400 uppercase tracking-wider text-center mb-4">Connect with me</h3>
            <div class="flex flex-wrap justify-center gap-3">
                <a class="social-link" href="https://www.youtube.com/@eCode_sa" target="_blank" title="YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>
                <a class="social-link" href="https://www.facebook.com/ecode.sa" target="_blank" title="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a class="social-link" href="https://www.tiktok.com/@ecode_sa" target="_blank" title="TikTok">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
                <a class="social-link" href="https://www.instagram.com/ecode_sa" target="_blank" title="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a class="social-link" href="https://www.snapchat.com/add/ecode_sa" target="_blank" title="Snapchat">
                    <i class="fa-brands fa-snapchat"></i>
                </a>
                <a class="social-link" href="https://www.linkedin.com/company/ecode-sa" target="_blank" title="LinkedIn">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
                <a class="social-link" href="https://x.com/eCode_sa" target="_blank" title="X">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>
            </div>
        </div>
        
    </main>

    <!-- Script for vCard Generation -->
    <script>
        async function downloadVCard() {
            // تغيير حالة الزر أثناء تجهيز الصورة
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Preparing...';
            btn.style.pointerEvents = 'none';

            let photoString = 'PHOTO;TYPE=JPEG;VALUE=URI:https://ecode.sa/icons/favicon/Basel.png';
            
            try {
                // جلب الصورة وتحويلها إلى Base64 لتضمينها داخل ملف جهة الاتصال
                const response = await fetch('https://ecode.sa/icons/favicon/Basel.png');
                const blob = await response.blob();
                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                });
                
                if (base64) {
                    photoString = `PHOTO;ENCODING=b;TYPE=JPEG:${base64}`;
                }
            } catch (error) {
                console.warn("Could not fetch image to embed, falling back to URL.", error);
            }

            // vCard format content
            const vcardContent = `BEGIN:VCARD
VERSION:3.0
N:Shubair;Basel;;;
FN:Basel Shubair
ORG;CHARSET=utf-8:eCode;
TITLE;CHARSET=utf-8:Project Manager
TEL;TYPE=WORK,VOICE:0592505652
EMAIL;TYPE=PREF,INTERNET:Basel@eCode.sa
URL:https://ecode.sa/
ADR;TYPE=WORK;CHARSET=utf-8:;;;Riyadh;;;Saudi Arabia
${photoString}
X-SOCIALPROFILE;type=twitter:https://x.com/eCode_sa
X-SOCIALPROFILE;type=linkedin:https://www.linkedin.com/company/ecode-sa
X-SOCIALPROFILE;type=instagram:https://www.instagram.com/ecode_sa
END:VCARD`;

            // Create a Blob with the content
            const vcardBlob = new Blob([vcardContent], { type: 'text/vcard;charset=utf-8' });
            
            // Create a link element
            const link = document.createElement('a');
            link.href = URL.createObjectURL(vcardBlob);
            
            // Set the downloaded file name
            link.download = 'Basel_Shubair.vcf';
            
            // Append link, click it, and remove it
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // إعادة الزر لحالته الطبيعية
            btn.innerHTML = originalText;
            btn.style.pointerEvents = 'auto';
        }
    </script>
</body>
</html>
