<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لا يوجد اتصال | eCode</title>
  <meta name="description" content="Offline page for eCode website." />

  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --text-main: 'Cairo', sans-serif;
      --primary: #4F46E5;
      --secondary: #7C3AED;
      --bg-light: #f8fafc;
      --card-light: rgba(255, 255, 255, 0.88);
      --text-light: #0f172a;
      --muted-light: #64748b;
      --border-light: rgba(15, 23, 42, 0.08);

      --bg-dark: #020617;
      --card-dark: rgba(15, 23, 42, 0.82);
      --text-dark: #f8fafc;
      --muted-dark: #94a3b8;
      --border-dark: rgba(255, 255, 255, 0.08);
    }

    html[lang="en"] {
      --text-main: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--text-main);
      background: var(--bg-light);
      color: var(--text-light);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    html.dark body {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    .bg-glow {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow::before,
    .bg-glow::after {
      content: "";
      position: absolute;
      border-radius: 9999px;
      filter: blur(80px);
      opacity: 0.22;
    }

    .bg-glow::before {
      width: 320px;
      height: 320px;
      background: var(--primary);
      top: -60px;
      inset-inline-start: -60px;
    }

    .bg-glow::after {
      width: 360px;
      height: 360px;
      background: var(--secondary);
      bottom: -100px;
      inset-inline-end: -80px;
    }

    .offline-wrapper {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    .offline-card {
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: var(--card-light);
      border: 1px solid var(--border-light);
      border-radius: 28px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }

    html.dark .offline-card {
      background: var(--card-dark);
      border-color: var(--border-dark);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .offline-logo {
      width: 68px;
      height: 68px;
      object-fit: contain;
      border-radius: 16px;
      margin-bottom: 18px;
    }

    .offline-icon {
      font-size: 42px;
      line-height: 1;
      display: inline-block;
      margin-bottom: 14px;
    }

    .offline-title {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 800;
      line-height: 1.2;
    }

    .offline-text {
      margin: 0 auto 28px;
      max-width: 420px;
      font-size: 1rem;
      line-height: 1.8;
      color: var(--muted-light);
    }

    html.dark .offline-text {
      color: var(--muted-dark);
    }

    .offline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      appearance: none;
      border: 0;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 150px;
      padding: 14px 22px;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: #fff;
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.24);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .btn-secondary {
      background: transparent;
      color: inherit;
      border: 1px solid rgba(100, 116, 139, 0.25);
    }

    html.dark .btn-secondary {
      border-color: rgba(255, 255, 255, 0.12);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      color: var(--primary);
    }

    @media (max-width: 640px) {
      .offline-card {
        padding: 32px 20px;
        border-radius: 24px;
      }

      .offline-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <main class="offline-wrapper">
    <div class="offline-card">
      <img src="/favicon.png" alt="eCode Logo" class="offline-logo" />
      <div class="offline-icon">📡</div>
      <h1 class="offline-title" data-i18n="offline_title">لا يوجد اتصال بالإنترنت</h1>
      <p class="offline-text" data-i18n="offline_text">
        تحقق من اتصالك بالإنترنت ثم حاول مرة أخرى للوصول إلى موقع eCode.
      </p>

      <div class="offline-actions">
        <button onclick="window.location.reload()" class="btn btn-primary" data-i18n="btn_retry">
          إعادة المحاولة
        </button>

        <a href="/?source=pwa" class="btn btn-secondary" data-i18n="btn_home_offline">
          الرئيسية
        </a>
      </div>
    </div>
  </main>

  <script>
    const translations = {
      ar: {
        page_title: "لا يوجد اتصال | eCode",
        offline_title: "لا يوجد اتصال بالإنترنت",
        offline_text: "تحقق من اتصالك بالإنترنت ثم حاول مرة أخرى للوصول إلى موقع eCode.",
        btn_retry: "إعادة المحاولة",
        btn_home_offline: "الرئيسية"
      },
      en: {
        page_title: "No Connection | eCode",
        offline_title: "No Internet Connection",
        offline_text: "Please check your internet connection and try again to access eCode.",
        btn_retry: "Try Again",
        btn_home_offline: "Home"
      }
    };

    function applyOfflineLanguage(lang) {
      const html = document.documentElement;
      const currentLang = translations[lang] ? lang : 'ar';

      html.setAttribute('lang', currentLang);
      html.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');

      document.title = translations[currentLang].page_title;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLang][key]) {
          el.innerHTML = translations[currentLang][key];
        }
      });
    }

    function applyOfflineTheme() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('userLanguage') || 'ar';
      applyOfflineLanguage(savedLang);
      applyOfflineTheme();
    });
  </script>
</body>
</html>
