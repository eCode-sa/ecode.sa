              <div>
                <h4 className="text-white font-bold mb-6 text-lg">{t.nav.contact}</h4>
                <ul className="space-y-4">
                  <li className="flex items-start gap-3">
                    <Phone className="w-5 h-5 text-[#C19A5B] shrink-0 mt-1" />
                    <a href={`tel:${WHATSAPP_NUMBER}`} className="hover:text-white dir-ltr inline-block" dir="ltr">
                      +{WHATSAPP_NUMBER}
                    </a>
                  </li>
                  <li className="flex items-start gap-3">
                    <MessageCircle className="w-5 h-5 text-[#C19A5B] shrink-0 mt-1" />
                    <a href={whatsappLink} target="_blank" rel="noreferrer" className="hover:text-white">
                      WhatsApp Chat
                    </a>
                  </li>
                </ul>
              </div>
            </div>
            
            <div className="container mx-auto px-4 md:px-8 mt-12 pt-8 border-t border-gray-700 text-center text-sm">
              <p>{t.footer.rights}</p>
            </div>
          </footer>

          {/* Floating WhatsApp Button */}
          <a
            href={whatsappLink}
            target="_blank"
            rel="noreferrer"
            className={`fixed bottom-6 ${isRtl ? 'left-6' : 'right-6'} z-50 bg-[#25D366] text-white p-4 rounded-full shadow-lg hover:bg-[#128C7E] transition-all hover:scale-110 flex items-center justify-center`}
            title="Contact us on WhatsApp"
          >
            <MessageCircle className="w-8 h-8" />
          </a>
        </div>
      );
    }

    // تهيئة المشروع وربطه بعنصر HTML
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
