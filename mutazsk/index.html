                  aria-label="Toggle menu"
                >
                  {isMenuOpen ? <X className="w-7 h-7" /> : <Menu className="w-7 h-7" />}
                </button>
              </div>
            </div>

            {/* Mobile Menu */}
            {isMenuOpen && (
              <div className="lg:hidden absolute top-full left-0 w-full bg-white shadow-xl border-t border-gray-100 py-4 px-4">
                <div className="flex flex-col gap-2">
                  {navLinks.map((link) => (
                    <a
                      key={link.name}
                      href={link.href}
                      onClick={() => setIsMenuOpen(false)}
                      className="block text-gray-800 font-bold py-3 border-b border-gray-100"
                    >
                      {link.name}
                    </a>
                  ))}

                  <a
                    href={whatsappLink}
                    target="_blank"
                    rel="noreferrer"
                    className="mt-3 w-full bg-brand-navy text-white text-center py-3 rounded-xl font-bold"
                  >
                    {t.nav.contact}
                  </a>
                </div>
              </div>
            )}
          </nav>

          {/* Hero */}
          <section id="home" className="relative pt-32 pb-20 md:pt-48 md:pb-32 bg-brand-navy overflow-hidden">
            <div className="absolute inset-0 hero-pattern opacity-80"></div>

            <div className={`absolute top-24 ${isRtl ? 'left-[-120px]' : 'right-[-120px]'} w-80 h-80 rounded-full bg-brand-gold/10 blur-3xl`}></div>
            <div className={`absolute bottom-[-120px] ${isRtl ? 'right-[-120px]' : 'left-[-120px]'} w-96 h-96 rounded-full bg-white/10 blur-3xl`}></div>

            <div className="container mx-auto px-4 md:px-8 relative z-10">
              <div className="grid lg:grid-cols-2 gap-12 items-center">

                <div className="max-w-3xl">
                  <div className="inline-flex items-center gap-2 bg-white/10 border border-white/15 rounded-full px-4 py-2 mb-6">
                    <Ruler className="w-4 h-4 text-brand-gold" />
                    <span className="text-sm font-bold text-brand-gold">{t.hero.eyebrow}</span>
                  </div>

                  <h1 className="text-4xl md:text-5xl lg:text-6xl font-black text-white leading-tight mb-6">
                    {t.hero.title}
                  </h1>

                  <p className="text-lg md:text-xl text-gray-300 mb-10 leading-relaxed max-w-2xl">
                    {t.hero.subtitle}
                  </p>

                  <div className="flex flex-wrap gap-4">
                    <a
                      href={whatsappLink}
                      target="_blank"
                      rel="noreferrer"
                      className="bg-brand-gold hover:bg-brand-goldDark text-white px-8 py-3.5 rounded-xl font-bold transition-all shadow-lg flex items-center gap-2"
                    >
                      <Phone className="w-5 h-5" />
                      {t.hero.cta}
                    </a>

                    <a
                      href="#services"
                      className="bg-transparent border border-white/80 hover:bg-white hover:text-brand-navy text-white px-8 py-3.5 rounded-xl font-bold transition-all"
                    >
                      {t.hero.secondaryCta}
                    </a>
                  </div>
                </div>

                <div className="hidden lg:flex justify-center">
                  <div className="relative">
                    <div className="absolute inset-0 bg-brand-gold/20 blur-3xl rounded-full"></div>
                    <div className="relative bg-white/95 rounded-[2rem] p-10 shadow-2xl border border-white/40">
                      <img
                        src={LOGO_URL}
                        onError={(e) => { e.currentTarget.src = FAVICON_URL; }}
                        alt={isRtl ? 'شعار مؤسسة معتز الشمري' : 'Mutaz Alshammari Logo'}
                        className="w-80 h-auto object-contain"
                      />
                    </div>
                  </div>
                </div>

              </div>

              {/* Stats */}
              <div className="grid sm:grid-cols-3 gap-4 mt-16">
                {t.stats.map((item, index) => (
                  <div key={index} className="bg-white/10 border border-white/15 rounded-2xl p-5 backdrop-blur-sm">
                    <div className="text-2xl font-black text-white mb-1" dir="ltr">{item.value}</div>
                    <div className="text-sm text-gray-300 font-bold">{item.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* About */}
          <section id="about" className="py-20 bg-white">
            <div className="container mx-auto px-4 md:px-8">
              <SectionHeading title={t.about.title} subtitle={t.about.subtitle} />

              <div className="grid md:grid-cols-2 gap-8 lg:gap-10">
                <div className="bg-brand-concrete p-8 rounded-3xl border border-gray-100 shadow-soft relative overflow-hidden">
                  <div className={`absolute top-0 ${isRtl ? 'right-0' : 'left-0'} w-2 h-full bg-brand-gold`}></div>
                  <IconBox icon={Target} className="mb-6" />
                  <h3 className="text-2xl font-black text-brand-navy mb-4">{t.about.visionTitle}</h3>
                  <p className="text-gray-600 leading-relaxed text-lg">{t.about.visionDesc}</p>
                </div>

                <div className="bg-brand-concrete p-8 rounded-3xl border border-gray-100 shadow-soft relative overflow-hidden">
                  <div className={`absolute top-0 ${isRtl ? 'right-0' : 'left-0'} w-2 h-full bg-brand-navy`}></div>
                  <IconBox icon={CheckCircle2} className="mb-6" />
                  <h3 className="text-2xl font-black text-brand-navy mb-4">{t.about.missionTitle}</h3>
                  <p className="text-gray-600 leading-relaxed text-lg">{t.about.missionDesc}</p>
                </div>
              </div>
            </div>
          </section>

          {/* Services */}
          <section id="services" className="py-20 bg-brand-concrete">
            <div className="container mx-auto px-4 md:px-8">
              <SectionHeading title={t.services.title} subtitle={t.services.subtitle} />

              <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                {t.services.items.map((service, index) => {
                  const Icon = service.icon;
                  return (
                    <div
                      key={index}
                      className="bg-white p-7 rounded-3xl shadow-sm hover:shadow-soft transition-all duration-300 border border-gray-100 hover:border-brand-gold/70 group"
                    >
                      <IconBox icon={Icon} className="mb-6 group-hover:bg-brand-gold/10 transition-colors" />
                      <h3 className="text-xl font-black text-brand-navy mb-3">{service.title}</h3>
                      <p className="text-gray-600 leading-relaxed text-sm md:text-base">
                        {service.desc}
                      </p>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>

          {/* Sectors */}
          <section id="sectors" className="py-20 bg-white">
            <div className="container mx-auto px-4 md:px-8">
              <SectionHeading title={t.sectors.title} subtitle={t.sectors.subtitle} />

              <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                {t.sectors.items.map((item, index) => {
                  const Icon = item.icon;
                  return (
                    <div
                      key={index}
                      className="group relative overflow-hidden rounded-3xl bg-brand-navy min-h-[250px] flex items-end p-6 border border-gray-200"
                    >
                      <div className="absolute inset-0 hero-pattern opacity-20"></div>
                      <div className="absolute top-6 right-6 rtl:right-auto rtl:left-6 opacity-20">
                        <Icon className="w-28 h-28 text-white" />
                      </div>
                      <div className="relative z-10 bg-white/95 backdrop-blur-sm p-5 w-full rounded-2xl shadow-sm transform translate-y-2 group-hover:translate-y-0 transition-transform">
                        <p className="text-sm text-brand-gold font-extrabold mb-1">{item.category}</p>
                        <h3 className="text-lg font-black text-brand-navy leading-snug">{item.title}</h3>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </section>

          {/* Why Us */}
          <section id="why" className="py-20 bg-brand-concrete">
            <div className="container mx-auto px-4 md:px-8">
              <SectionHeading title={t.why.title} subtitle={t.why.subtitle} />

              <div className="grid md:grid-cols-3 gap-6">
                {t.why.items.map((item, index) => (
                  <div key={index} className="bg-white rounded-3xl p-8 border border-gray-100 shadow-sm">
                    <div className="w-12 h-12 rounded-2xl bg-brand-gold text-white flex items-center justify-center font-black text-xl mb-6">
                      {index + 1}
                    </div>
                    <h3 className="text-xl font-black text-brand-navy mb-3">{item.title}</h3>
                    <p className="text-gray-600 leading-relaxed">{item.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Contact CTA */}
          <section id="contact" className="py-20 bg-white">
            <div className="container mx-auto px-4 md:px-8">
              <div className="relative overflow-hidden bg-brand-navy rounded-[2rem] p-8 md:p-12 text-center shadow-2xl">
                <div className="absolute inset-0 hero-pattern opacity-20"></div>
                <div className="relative z-10 max-w-3xl mx-auto">
                  <h2 className="text-3xl md:text-4xl font-black text-white mb-4">
                    {t.contact.title}
                  </h2>
                  <p className="text-gray-300 leading-relaxed mb-8">
                    {t.contact.subtitle}
                  </p>

                  <div className="flex flex-wrap justify-center gap-4">
                    <a
                      href={whatsappLink}
                      target="_blank"
                      rel="noreferrer"
                      className="bg-brand-gold hover:bg-brand-goldDark text-white px-8 py-3.5 rounded-xl font-bold transition-all shadow-lg inline-flex items-center gap-2"
                    >
                      <MessageCircle className="w-5 h-5" />
                      {t.contact.button}
                    </a>

                    <a
                      href={`tel:+${WHATSAPP_NUMBER}`}
                      className="bg-white hover:bg-gray-100 text-brand-navy px-8 py-3.5 rounded-xl font-bold transition-all inline-flex items-center gap-2"
                      dir="ltr"
                    >
                      <Phone className="w-5 h-5" />
                      +{WHATSAPP_NUMBER}
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="bg-brand-navy text-gray-300 py-12 border-t-4 border-brand-gold">
            <div className="container mx-auto px-4 md:px-8 grid md:grid-cols-3 gap-10">

              <div>
                <div className="flex items-center gap-3 mb-6">
                  <div className="w-14 h-14 bg-white rounded-xl flex items-center justify-center overflow-hidden border border-brand-gold">
                    <img
                      src={LOGO_URL}
                      onError={(e) => { e.currentTarget.src = FAVICON_URL; }}
                      alt={isRtl ? 'شعار مؤسسة معتز الشمري' : 'Mutaz Alshammari Logo'}
                      className="w-full h-full object-contain p-1.5"
                    />
                  </div>
                  <div>
                    <h3 className="font-black text-white text-lg leading-tight">
                      {isRtl ? 'مؤسسة معتز الشمري' : 'Mutaz Alshammari'}
                    </h3>
                    <p className="text-brand-gold font-bold text-sm">
                      {isRtl ? 'للمقاولات' : 'Contracting'}
                    </p>
                  </div>
                </div>

                <p className="text-sm mb-4 leading-relaxed">{t.footer.desc}</p>
                <p className="text-sm font-bold text-white mb-1">{t.footer.legalName}</p>
                <p className="text-sm font-bold text-brand-gold" dir="ltr">{t.footer.cr}</p>
              </div>

              <div>
                <h4 className="text-white font-black mb-6 text-lg">
                  {isRtl ? 'روابط سريعة' : 'Quick Links'}
                </h4>
                <ul className="space-y-3">
                  {navLinks.map((link) => (
                    <li key={link.name}>
                      <a href={link.href} className="text-sm hover:text-brand-gold transition-colors flex items-center gap-2">
                        <ChevronRight className={`w-4 h-4 ${isRtl ? 'rotate-180' : ''}`} />
                        {link.name}
                      </a>
                    </li>
                  ))}
                </ul>
              </div>

              <div>
                <h4 className="text-white font-black mb-6 text-lg">{t.nav.contact}</h4>
                <ul className="space-y-4">
                  <li className="flex items-start gap-3">
                    <Phone className="w-5 h-5 text-brand-gold shrink-0 mt-1" />
                    <a href={`tel:+${WHATSAPP_NUMBER}`} className="hover:text-white inline-block" dir="ltr">
                      +{WHATSAPP_NUMBER}
                    </a>
                  </li>

                  <li className="flex items-start gap-3">
                    <MessageCircle className="w-5 h-5 text-brand-gold shrink-0 mt-1" />
                    <a href={whatsappLink} target="_blank" rel="noreferrer" className="hover:text-white inline-flex items-center gap-2">
                      WhatsApp
                      <ArrowUpRight className="w-4 h-4" />
                    </a>
                  </li>

                  <li className="flex items-start gap-3">
                    <MapPin className="w-5 h-5 text-brand-gold shrink-0 mt-1" />
                    <span>{isRtl ? 'المملكة العربية السعودية' : 'Saudi Arabia'}</span>
                  </li>
                </ul>
              </div>
            </div>

            <div className="container mx-auto px-4 md:px-8 mt-12 pt-8 border-t border-white/10 text-center text-sm">
              <p>{t.footer.rights}</p>
            </div>
          </footer>

          {/* Floating WhatsApp */}
          <a
            href={whatsappLink}
            target="_blank"
            rel="noreferrer"
            className={`fixed bottom-6 ${isRtl ? 'left-6' : 'right-6'} z-50 bg-[#25D366] text-white p-4 rounded-full shadow-lg hover:bg-[#128C7E] transition-all hover:scale-110 flex items-center justify-center`}
            title="Contact us on WhatsApp"
            aria-label="Contact us on WhatsApp"
          >
            <MessageCircle className="w-8 h-8" />
          </a>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
